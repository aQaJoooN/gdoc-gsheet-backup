# Google Docs & Sheets Backup Configuration

# Google Account OAuth credentials
google_account:
  credentials_file: "credentials.json"  # OAuth credentials from Google Cloud Console
  token_file: "token.json"              # Will be created automatically on first run

# Google Sheets to backup
google_sheets:
  - url: "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit"
    export_format: "xlsx"  # Options: xlsx, pdf, ods, html, csv
    name: "my-spreadsheet"
  
  - url: "https://docs.google.com/spreadsheets/d/ANOTHER_SHEET_ID/edit"
    export_format: "csv"
    name: "data-export"

# Google Docs to backup
google_docs:
  - url: "https://docs.google.com/document/d/YOUR_DOC_ID/edit"
    export_format: "md"  # Options: md, docx, pdf, txt, html
    name: "my-document"
  
  - url: "https://docs.google.com/document/d/ANOTHER_DOC_ID/edit"
    export_format: "docx"
    name: "report"

# Google Drive Files (any file type - PDFs, images, etc.)
google_drive_files:
  - url: "https://drive.google.com/file/d/YOUR_FILE_ID/view"
    name: "presentation.pdf"
  
  - url: "https://drive.google.com/file/d/ANOTHER_FILE_ID/view"
    name: "diagram.png"

# Backup configuration
backup:
  type: "local"  # Options: local, git
  local_path: "./backups"
  
  # Git repository settings (used when type is "git")
  git:
    repository: "https://github.com/username/backup-repo.git"
    branch: "main"
    credentials:
      username: "your-username"
      token: "your-personal-access-token"
    commit_message: "Backup: {timestamp}"
